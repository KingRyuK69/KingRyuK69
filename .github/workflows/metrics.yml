name: Metrics
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: KingRyuK69
          template: classic
          filename: github-metrics.svg

          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_load: 300
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%
          plugin_languages_details: percentage

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # plugin_habits and plugin_achievements disabled: both error out on the
          # current lowlighter/metrics release (habits crashes on undefined commit
          # authors; achievements queries GitHub's classic Projects API, which
          # GitHub sunset in May 2024). Re-enable if upstream fixes land.
          plugin_habits: no
          plugin_achievements: no

          plugin_lines: yes
          plugin_lines_sections: repositories
